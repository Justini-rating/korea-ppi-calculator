name: Monthly Data Update

on:
  schedule:
    # KST 기준: 매월 24일 08:00 (UTC 기준 23일 23:00)
    - cron: '0 23 23 * *' 
  workflow_dispatch:      # 수동 실행 버튼

# [경고 해결] Node.js 20 지원 종료(26.6.2) 대비 Node.js 24 강제 사용 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 모든 기록을 가져와야 충돌 해결 가능

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install
        run: pip install pandas requests python-dateutil

      - name: Run
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python update_data.py

      - name: Commit and Push (No-Reject Logic)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data.csv
          
          # 변경 사항이 있을 때만 진행
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: $(date +'%Y-%m-%d')"
            
            # [해결사] 서버 내용을 먼저 가져와 합친 뒤 푸시 (충돌 원천 차단)
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected."
          fi
