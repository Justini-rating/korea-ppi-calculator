name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 23 * *' # 매월 23일 자동 실행 (기능 유지)
  workflow_dispatch:      # 수동 실행 버튼 유지

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리 전체를 가져와서 꼬임 방지

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl python-dateutil

      - name: Run update script
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python update_data.py

      - name: Forced Update to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data.csv
          
          # 변경사항 확인 (없으면 종료)
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
            exit 0
          fi
          
          git commit -m "Auto-update PPI data (2026 Revision): $(date +'%Y-%m-%d')"
          
          # [최후의 수단] --force 옵션을 사용하여 서버의 모든 거절을 무시하고 강제 업데이트
          git push origin main --force
