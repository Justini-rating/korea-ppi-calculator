name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 23 * *' # 매월 23일 자동 실행 기능 유지
  workflow_dispatch:      # 수동 실행 버튼 유지

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 모든 과거 기록을 가져와서 충돌 원천 차단

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl python-dateutil

      - name: Run update script
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python update_data.py

      - name: Force Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data.csv
          
          # 변경사항이 없으면 종료, 있으면 강제 푸시
          if git diff --staged --quiet; then
            echo "변경사항 없음"
            exit 0
          fi
          
          git commit -m "Auto-update data: $(date +'%Y-%m-%d')"
          
          # [핵심] 서버의 어떤 거절도 무시하고 강제로 밀어넣음
          git push origin main --force
