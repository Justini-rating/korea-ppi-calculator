name: Monthly Data Update

on:
  schedule:
    # 매월 23일 한국시간 오전 9시 자동 실행 (기능 유지)
    - cron: '0 0 23 * *'
  
  # 수동 실행 버튼 유지
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 저장소 최신 상태 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리 전체를 가져와서 꼬임 방지

      # 2. 파이썬 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 라이브러리 설치
      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl python-dateutil

      # 4. 데이터 업데이트 스크립트 실행
      - name: Run update script
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python update_data.py

      # 5. [핵심 해결책] 강제로 서버에 밀어넣기
      # 'Rejected' 에러가 나도 무시하고 서버를 현재 데이터로 덮어씌웁니다.
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add data.csv
          
          # 변경사항이 없으면 조용히 종료
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update data: $(date +'%Y-%m-%d')"
          
          # [핵심] --force를 붙여서 서버의 거부를 강제로 뚫고 올라갑니다.
          git push origin main --force
